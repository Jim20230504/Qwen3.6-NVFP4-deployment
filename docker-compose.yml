services:
  postgres:
    image: postgres:16
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ai-platform

  adminer:
    image: adminer:4
    container_name: ai-platform-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-platform

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-platform-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ai-platform

  vllm-qwen32b:
    image: vllm/vllm-openai:latest
    container_name: ai-platform-vllm-qwen32b
    restart: unless-stopped
    profiles: ["qwen"]
    env_file:
      - .env
      - ./config/vllm/qwen32b.env
    command:
      - --served-model-name
      - qwen32b
      - --tokenizer
      - ${QWEN32B_MODEL_PATH}
      - --model
      - ${QWEN32B_MODEL_PATH}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${QWEN32B_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${QWEN32B_MAX_NUM_SEQS}
      - --gpu-memory-utilization
      - ${QWEN32B_GPU_MEMORY_UTILIZATION}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    ipc: host
    volumes:
      - ./data/huggingface:/models/huggingface
      - ./data/models:/models/local
      - ./data/logs:/var/log/ai-platform
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ai-platform

  vllm-qwen14b:
    image: vllm/vllm-openai:latest
    container_name: ai-platform-vllm-qwen14b
    restart: unless-stopped
    profiles: ["qwen14b"]
    env_file:
      - .env
      - ./config/vllm/qwen14b.env
    command:
      - --served-model-name
      - qwen14b
      - --tokenizer
      - ${QWEN14B_MODEL_PATH}
      - --model
      - ${QWEN14B_MODEL_PATH}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${QWEN14B_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${QWEN14B_MAX_NUM_SEQS}
      - --gpu-memory-utilization
      - ${QWEN14B_GPU_MEMORY_UTILIZATION}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    ipc: host
    volumes:
      - ./data/huggingface:/models/huggingface
      - ./data/models:/models/local
      - ./data/logs:/var/log/ai-platform
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ai-platform

  vllm-deepseek:
    image: vllm/vllm-openai:latest
    container_name: ai-platform-vllm-deepseek
    restart: unless-stopped
    profiles: ["deepseek"]
    env_file:
      - .env
      - ./config/vllm/deepseek.env
    command:
      - --served-model-name
      - deepseekcoder
      - --tokenizer
      - ${DEEPSEEK_MODEL_PATH}
      - --model
      - ${DEEPSEEK_MODEL_PATH}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${DEEPSEEK_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${DEEPSEEK_MAX_NUM_SEQS}
      - --gpu-memory-utilization
      - ${DEEPSEEK_GPU_MEMORY_UTILIZATION}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    ipc: host
    volumes:
      - ./data/huggingface:/models/huggingface
      - ./data/models:/models/local
      - ./data/logs:/var/log/ai-platform
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ai-platform

  vllm-qwen36:
    build:
      context: .
      dockerfile: Dockerfile.vllm-qwen36
    image: ai-platform-vllm-qwen36:v0.25.0
    container_name: ai-platform-vllm-qwen36
    restart: unless-stopped
    profiles: ["qwen36"]
    env_file:
      - .env
      - ./config/vllm/qwen36.env
    command:
      - --served-model-name
      - qwen36
      - --tokenizer
      - ${QWEN36_MODEL_PATH}
      - --model
      - ${QWEN36_MODEL_PATH}
      - --dtype
      - bfloat16
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${QWEN36_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${QWEN36_MAX_NUM_SEQS}
      - --gpu-memory-utilization
      - ${QWEN36_GPU_MEMORY_UTILIZATION}
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
    ipc: host
    volumes:
      - ./data/huggingface:/models/huggingface
      - ./data/models:/models/local
      - ./data/logs:/var/log/ai-platform
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ai-platform

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-platform-nginx
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      adminer:
        condition: service_started
    ports:
      - "${HOST_HTTP_PORT}:80"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-platform

networks:
  ai-platform:
    driver: bridge
